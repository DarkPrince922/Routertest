# Rules of Engagement (ROE) — source of truth for authorized targets.
#
# This file is intentionally edited ONLY on the host (not from the bot). Changing
# allowed targets requires editing this file and restarting the service:
#     sudo systemctl restart pentest-bot
#
# A target is allowed if EITHER:
#   - its resolved IP falls inside one of allowed_cidrs, OR
#   - the literal host string is listed in allowed_hosts.
#
# allow_all: when true the scope gate is DISABLED and every target is accepted
# (decisions are still audited). Keep it false to enforce the ROE below.
engagement_id: "lab-2026-01"

allow_all: false

allowed_cidrs:
  - 192.168.1.0/24

allowed_hosts:
  - myrouter.local
